<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Mercato Imprese</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      background: #0d1117;
      color: #e6edf3;
    }

    h1, h2 {
      margin-top: 0;
    }

    a {
      color: #58a6ff;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    input[type="text"],
    input[type="number"],
    input[type="file"] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #e6edf3;
    }

    button {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #238636;
      background: #238636;
      color: #ffffff;
      cursor: pointer;
      font-weight: 600;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #lista-aziende {
      display: grid;
      gap: 12px;
    }

    .azienda {
      display: flex;
      gap: 16px;
      align-items: center;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #0d1117;
    }

    .azienda img {
      max-width: 80px;
      max-height: 80px;
      object-fit: contain;
      border-radius: 4px;
      border: 1px solid #30363d;
      background: #161b22;
    }

    .azienda-info {
      flex: 1;
    }

    .azienda strong {
      font-size: 16px;
      display: block;
      margin-bottom: 4px;
    }

    .muted {
      color: #8b949e;
      font-size: 14px;
    }

    .error {
      color: #f85149;
      margin-top: 8px;
      font-size: 14px;
    }

    .success {
      color: #3fb950;
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mercato Imprese</h1>

    <!-- FORM NUOVA AZIENDA -->
    <div class="card">
      <h2>Nuova azienda</h2>
      <form id="azienda-form">
        <label for="nome">Nome azienda</label>
        <input type="text" id="nome" name="nome" required />

        <label for="prezzo">Prezzo</label>
        <input type="number" id="prezzo" name="prezzo" step="0.01" min="0" required />

        <label for="file">File (immagine o PDF)</label>
        <input
          type="file"
          id="file"
          name="file"
          accept="image/*,application/pdf"
        />

        <button type="submit">Salva azienda</button>
        <div id="form-messaggi"></div>
      </form>
    </div>

    <!-- LISTA AZIENDE -->
    <div class="card">
      <h2>Elenco aziende</h2>
      <div id="lista-aziende" class="muted">Caricamento in corso...</div>
    </div>
  </div>

  <script>
    // ✅ URL reale della tua API Google Apps Script
    const API = "https://script.google.com/macros/s/AKfycbys7MS7IqU63wueVOYaZGlEyldR5bEWlNxQ_vUBdasrcJ_IscUpOUIVi1xDRl9w_MsuYg/exec";

    let fileBase64 = null;
    let fileMimeType = null;

    const fileInput = document.getElementById("file");
    const form = document.getElementById("azienda-form");
    const formMessaggi = document.getElementById("form-messaggi");
    const listaAziende = document.getElementById("lista-aziende");

    // Legge il file selezionato come base64
    fileInput.addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) {
        fileBase64 = null;
        fileMimeType = null;
        return;
      }

      fileMimeType = file.type || null;

      const reader = new FileReader();
      reader.onload = (e) => {
        fileBase64 = e.target.result; // data:<mime>;base64,....
      };
      reader.readAsDataURL(file);
    });

    // Salvataggio nuova azienda (POST)
    form.addEventListener("submit", (event) => {
      event.preventDefault();
      formMessaggi.textContent = "";
      formMessaggi.className = "";

      const nome = document.getElementById("nome").value.trim();
      const prezzoValue = document.getElementById("prezzo").value;
      const prezzo = prezzoValue ? Number(prezzoValue) : null;

      if (!nome || prezzo === null || Number.isNaN(prezzo)) {
        formMessaggi.textContent = "Compila correttamente tutti i campi.";
        formMessaggi.className = "error";
        return;
      }

      const payload = {
        nome,
        prezzo,
        file: fileBase64,
        mimeType: fileMimeType,
      };

      const submitButton = form.querySelector("button[type=submit]");
      submitButton.disabled = true;

      fetch(API, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify(payload),
      })
        .then((res) => {
          if (!res.ok) {
            throw new Error("Errore HTTP " + res.status);
          }
          return res.json().catch(() => null);
        })
        .then(() => {
          formMessaggi.textContent = "Azienda salvata con successo.";
          formMessaggi.className = "success";
          form.reset();
          fileBase64 = null;
          fileMimeType = null;
          caricaAziende();
        })
        .catch((err) => {
          console.error("Errore salvataggio azienda:", err);
          formMessaggi.textContent =
            "Errore nel salvataggio dell'azienda. Controlla la console.";
          formMessaggi.className = "error";
        })
        .finally(() => {
          submitButton.disabled = false;
        });
    });

    // Carica elenco aziende (GET)
    function caricaAziende() {
      listaAziende.textContent = "Caricamento in corso...";

      fetch(API)
        .then((res) => {
          if (!res.ok) {
            throw new Error("Errore HTTP " + res.status);
          }
          return res.json();
        })
        .then((data) => {
          console.log("RISPOSTA API", data);

          // accetta sia un array diretto che { aziende: [...] }
          const aziende = Array.isArray(data)
            ? data
            : data.aziende || [];

          listaAziende.innerHTML = "";

          if (!aziende.length) {
            listaAziende.textContent = "Nessuna azienda presente.";
            listaAziende.className = "muted";
            return;
          }

          listaAziende.className = "";

          aziende.forEach((item) => {
            const div = document.createElement("div");
            div.className = "azienda";

            // contenitore info testuali
            const infoDiv = document.createElement("div");
            infoDiv.className = "azienda-info";

            // immagine / pdf
            let mediaHtml = "";

            if (item.mimeType && item.file) {
              if (item.mimeType.startsWith("application/pdf")) {
                mediaHtml = `<a href="${item.file}" target="_blank">Visualizza PDF</a>`;
              } else if (item.mimeType.startsWith("image/")) {
                mediaHtml = `<img src="${item.file}" alt="">`;
              }
            } else if (item.file) {
              // fallback generico: se non c'è mimeType ma c'è il file
              mediaHtml = `<img src="${item.file}" alt="">`;
            }

            if (mediaHtml) {
              const wrapper = document.createElement("div");
              wrapper.innerHTML = mediaHtml;
              const mediaNode = wrapper.firstChild;
              div.appendChild(mediaNode);
            }

            // testo
            const nome = item.nome ?? "";
            const prezzo = item.prezzo != null ? `€${item.prezzo}` : "";

            infoDiv.innerHTML = `
              <strong>${nome}</strong>
              <div class="muted">${prezzo}</div>
            `;

            div.appendChild(infoDiv);
            listaAziende.appendChild(div);
          });
        })
        .catch((err) => {
          console.error("Errore in caricaAziende:", err);
          listaAziende.textContent =
            "Errore nel caricamento delle aziende. Controlla la console.";
          listaAziende.className = "error";
        });
    }

    // Caricamento iniziale
    document.addEventListener("DOMContentLoaded", caricaAziende);
  </script>
</body>
</html>
