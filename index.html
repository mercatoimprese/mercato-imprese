<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Mercato Imprese</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      background: #0d1117;
      color: #e6edf3;
    }

    h1, h2 {
      margin-top: 0;
    }

    [hidden] {
      display: none !important;
    }

    a {
      color: #58a6ff;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    input[type="text"],
    input[type="number"],
    input[type="password"],
    input[type="file"] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #e6edf3;
    }

    button {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #238636;
      background: #238636;
      color: #ffffff;
      cursor: pointer;
      font-weight: 600;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .secondary {
      border-color: #30363d;
      background: #21262d;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
    }

    .topbar h1 {
      margin-bottom: 0;
    }

    #lista-aziende {
      display: grid;
      gap: 12px;
    }

    .azienda {
      display: flex;
      gap: 16px;
      align-items: center;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #0d1117;
    }

    .azienda img {
      max-width: 80px;
      max-height: 80px;
      object-fit: contain;
      border-radius: 4px;
      border: 1px solid #30363d;
      background: #161b22;
    }

    .media-gallery {
      display: grid;
      grid-template-columns: repeat(2, 80px);
      gap: 8px;
      flex-shrink: 0;
    }

    .media-gallery a,
    .media-gallery .media-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80px;
      padding: 6px;
      border: 1px solid #30363d;
      border-radius: 4px;
      background: #161b22;
      box-sizing: border-box;
      text-align: center;
    }

    .azienda-info {
      flex: 1;
      min-width: 0;
    }

    .azienda strong {
      font-size: 16px;
      display: block;
      margin-bottom: 4px;
    }

    .muted {
      color: #8b949e;
      font-size: 14px;
    }

    .error {
      color: #f85149;
      margin-top: 8px;
      font-size: 14px;
    }

    .success {
      color: #3fb950;
      margin-top: 8px;
      font-size: 14px;
    }

    .azienda-actions {
      display: flex;
      justify-content: flex-end;
    }

    .media-fallback {
      color: #8b949e;
      font-size: 14px;
      max-width: 160px;
    }

    .danger {
      border-color: #da3633;
      background: #da3633;
    }

    .status-note {
      margin-top: 8px;
    }

    @media (max-width: 640px) {
      .azienda {
        align-items: flex-start;
        flex-direction: column;
      }

      .azienda img {
        max-width: 100%;
        width: 100%;
        max-height: 220px;
      }

      .media-gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        width: 100%;
      }

      .azienda-actions {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>Mercato Imprese</h1>
      <a href="admin.html">Area riservata</a>
    </div>

    <!-- LOGIN AREA RISERVATA -->
    <div class="card" id="admin-login" hidden>
      <h2>Area riservata</h2>
      <form id="login-form">
        <label for="admin-password">Password</label>
        <input type="password" id="admin-password" autocomplete="current-password" required />
        <button type="submit">Accedi</button>
        <div id="login-messaggi"></div>
      </form>
    </div>

    <!-- FORM NUOVA AZIENDA -->
    <div class="card" id="admin-panel" hidden>
      <h2>Nuova azienda</h2>
      <form id="azienda-form">
        <label for="nome">Nome azienda</label>
        <input type="text" id="nome" name="nome" required />

        <label for="prezzo">Prezzo</label>
        <input type="number" id="prezzo" name="prezzo" step="0.01" min="0" required />

        <label for="file">Foto o PDF</label>
        <input
          type="file"
          id="file"
          name="file"
          accept="image/*,application/pdf"
          multiple
        />

        <div class="button-row">
          <button type="submit">Salva azienda</button>
          <button type="button" id="svuota-locale" class="secondary">
            Svuota archivio locale
          </button>
          <button type="button" id="admin-logout" class="secondary">
            Esci
          </button>
        </div>
        <div id="form-messaggi"></div>
      </form>
    </div>

    <!-- LISTA AZIENDE -->
    <div class="card">
      <h2>Elenco aziende</h2>
      <div id="lista-aziende" class="muted">Caricamento in corso...</div>
    </div>
  </div>

  <script>
    // URL della API Google Apps Script. Se non risponde, il sito salva comunque nel browser.
    const API = "https://script.google.com/macros/s/AKfycbys7MS7IqU63wueVOYaZGlEyldR5bEWlNxQ_vUBdasrcJ_IscUpOUIVi1xDRl9w_MsuYg/exec";
    const STORAGE_KEY = "mercato-imprese-aziende";
    const ADMIN_SESSION_KEY = "mercato-imprese-admin";
    const ADMIN_PASSWORD_HASH = "dd9d5285c048b6286330872e04ce80a276188bb1a5cb72fcf590401ae8f027c9";
    const LISTINGS_RESET_AT = "2026-07-05T04:35:44Z";
    const HIDDEN_REMOTE_LISTINGS = [
      "test codex|1|",
      "prova bis|1000|https://drive.google.com/uc?export=view&id=1r0DXyOVS_rFi016wpbRrol1lB1zPqQdR",
      "azienda prova|5|https://drive.google.com/uc?export=view&id=10YYjNvjT7x8AbqnLa33yBgr-tCcemlZg",
      "azienda prova new|10000000|https://drive.google.com/uc?export=view&id=1jx9P5gn8nf3VdGQArV8GmHCW25ioaLp6",
      "azienda prova pescara|150000|https://drive.google.com/uc?export=view&id=1eyDsgAva15IV0KGZZMHMuLoObp89k8pF",
      "prova|100|https://drive.google.com/uc?export=view&id=10--FRwkKmLDo6Sykp1WiYikFNW6unt6X",
      "prova|500|https://drive.google.com/uc?export=view&id=1tgveefKQSQpqHBMveQy-di7mkMK6Xib5",
    ];

    let aziendeRemote = [];
    let aziendeLocali = [];

    const fileInput = document.getElementById("file");
    const form = document.getElementById("azienda-form");
    const formMessaggi = document.getElementById("form-messaggi");
    const listaAziende = document.getElementById("lista-aziende");
    const svuotaLocaleButton = document.getElementById("svuota-locale");
    const adminLogin = document.getElementById("admin-login");
    const adminPanel = document.getElementById("admin-panel");
    const loginForm = document.getElementById("login-form");
    const loginMessaggi = document.getElementById("login-messaggi");
    const adminLogout = document.getElementById("admin-logout");
    const adminMode = new URLSearchParams(window.location.search).has("admin");

    function aggiornaAreaRiservata() {
      if (!adminMode) {
        adminLogin.hidden = true;
        adminPanel.hidden = true;
        return;
      }

      const accessoOk = sessionStorage.getItem(ADMIN_SESSION_KEY) === "ok";
      adminLogin.hidden = accessoOk;
      adminPanel.hidden = !accessoOk;
    }

    async function calcolaHash(testo) {
      const bytes = new TextEncoder().encode(testo);
      const digest = await crypto.subtle.digest("SHA-256", bytes);
      return Array.from(new Uint8Array(digest))
        .map((byte) => byte.toString(16).padStart(2, "0"))
        .join("");
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginMessaggi.textContent = "";
      loginMessaggi.className = "";

      const password = document.getElementById("admin-password").value;
      const hash = await calcolaHash(password);

      if (hash !== ADMIN_PASSWORD_HASH) {
        loginMessaggi.textContent = "Password non corretta.";
        loginMessaggi.className = "error";
        return;
      }

      sessionStorage.setItem(ADMIN_SESSION_KEY, "ok");
      loginForm.reset();
      aggiornaAreaRiservata();
    });

    adminLogout.addEventListener("click", () => {
      sessionStorage.removeItem(ADMIN_SESSION_KEY);
      window.location.href = "index.html";
    });

    function leggiArchivioLocale() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        aziendeLocali = raw
          ? JSON.parse(raw).filter((azienda) =>
              Date.parse(azienda.dataCreazione || "") >= Date.parse(LISTINGS_RESET_AT)
            )
          : [];
      } catch (err) {
        console.error("Archivio locale non leggibile:", err);
        aziendeLocali = [];
      }
    }

    function salvaArchivioLocale() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(aziendeLocali));
    }

    function leggiFileComeDataUrl(file) {
      return new Promise((resolve, reject) => {
        if (!file) {
          resolve({ file: null, mimeType: null, fileName: null });
          return;
        }

        const reader = new FileReader();
        reader.onload = (event) => {
          resolve({
            file: event.target.result,
            mimeType: file.type || "application/octet-stream",
            fileName: file.name,
          });
        };
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    async function leggiFilesComeDataUrl(fileList) {
      const files = Array.from(fileList || []);
      return Promise.all(files.map(leggiFileComeDataUrl));
    }

    async function creaCollageFoto(allegati, nome) {
      const foto = allegati.filter((allegato) =>
        allegato.mimeType && allegato.mimeType.startsWith("image/") && allegato.file
      );

      if (foto.length <= 1) {
        return foto[0] || allegati[0] || {
          file: null,
          mimeType: null,
          fileName: null,
        };
      }

      const immagini = await Promise.all(foto.map(caricaImmagineDaDataUrl));
      const tileSize = 900;
      const gap = 24;
      const columns = foto.length === 2 ? 2 : 3;
      const rows = Math.ceil(immagini.length / columns);
      const canvas = document.createElement("canvas");
      canvas.width = columns * tileSize + (columns + 1) * gap;
      canvas.height = rows * tileSize + (rows + 1) * gap;

      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      immagini.forEach((img, index) => {
        const column = index % columns;
        const row = Math.floor(index / columns);
        const x = gap + column * (tileSize + gap);
        const y = gap + row * (tileSize + gap);
        disegnaImmagineContain(ctx, img, x, y, tileSize, tileSize);
      });

      return {
        file: canvas.toDataURL("image/jpeg", 0.88),
        mimeType: "image/jpeg",
        fileName: `${normalizzaNomeFile(nome || "azienda")}-foto.jpg`,
      };
    }

    function caricaImmagineDaDataUrl(allegato) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = allegato.file;
      });
    }

    function disegnaImmagineContain(ctx, img, x, y, width, height) {
      const scale = Math.min(width / img.naturalWidth, height / img.naturalHeight);
      const drawWidth = img.naturalWidth * scale;
      const drawHeight = img.naturalHeight * scale;
      const drawX = x + (width - drawWidth) / 2;
      const drawY = y + (height - drawHeight) / 2;
      ctx.fillStyle = "#f6f8fa";
      ctx.fillRect(x, y, width, height);
      ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight);
    }

    function normalizzaNomeFile(nome) {
      return nome
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "") || "azienda";
    }

    async function provaSalvataggioRemoto(payload) {
      if (!API) {
        return false;
      }

      try {
        const res = await fetch(API, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8",
          },
          body: JSON.stringify(payload),
        });
        return res.ok;
      } catch (err) {
        console.warn("Salvataggio remoto non disponibile:", err);
        return false;
      }
    }

    // Salvataggio nuova azienda
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      formMessaggi.textContent = "";
      formMessaggi.className = "";

      const nome = document.getElementById("nome").value.trim();
      const prezzoValue = document.getElementById("prezzo").value;
      const prezzo = prezzoValue ? Number(prezzoValue) : null;

      if (!nome || prezzo === null || Number.isNaN(prezzo)) {
        formMessaggi.textContent = "Compila correttamente tutti i campi.";
        formMessaggi.className = "error";
        return;
      }

      const submitButton = form.querySelector("button[type=submit]");
      submitButton.disabled = true;

      try {
        const allegati = await leggiFilesComeDataUrl(fileInput.files);
        const allegatoOnline = await creaCollageFoto(allegati, nome);
        const primoAllegato = allegati[0] || {
          file: null,
          mimeType: null,
          fileName: null,
        };
        const azienda = {
          id: globalThis.crypto && crypto.randomUUID
            ? crypto.randomUUID()
            : String(Date.now()),
          nome,
          prezzo,
          dataCreazione: new Date().toISOString(),
          origine: "locale",
          files: allegati,
          ...primoAllegato,
        };

        aziendeLocali.unshift(azienda);
        salvaArchivioLocale();

        const remotoOk = await provaSalvataggioRemoto({
          ...azienda,
          ...allegatoOnline,
          files: allegati,
        });
        formMessaggi.textContent = remotoOk
          ? "Azienda salvata con successo anche online."
          : "Azienda salvata nel browser. Il salvataggio online non e' ancora disponibile.";
        formMessaggi.className = remotoOk ? "success" : "success";

        form.reset();
        renderAziende();
      } catch (err) {
        console.error("Errore salvataggio azienda:", err);
        formMessaggi.textContent =
          "Non sono riuscito a salvare l'azienda. Prova con un file piu' leggero.";
        formMessaggi.className = "error";
      } finally {
        submitButton.disabled = false;
      }
    });

    // Carica elenco aziende (GET)
    async function caricaAziende() {
      listaAziende.textContent = "Caricamento in corso...";
      leggiArchivioLocale();

      try {
        if (API) {
          const res = await fetch(API);
          if (!res.ok) {
            throw new Error("Errore HTTP " + res.status);
          }

          const data = await res.json();
          aziendeRemote = filtraAziendeRemote(Array.isArray(data) ? data : data.aziende || []);
        }
      } catch (err) {
        console.warn("Caricamento remoto non disponibile:", err);
        aziendeRemote = [];
      }

      renderAziende();
    }

    function filtraAziendeRemote(aziende) {
      const resetTime = Date.parse(LISTINGS_RESET_AT);
      return aziende.filter((azienda) => {
        if (HIDDEN_REMOTE_LISTINGS.includes(chiaveAnnuncio(azienda))) {
          return false;
        }

        if (!azienda.dataCreazione) {
          return true;
        }
        return Date.parse(azienda.dataCreazione) >= resetTime;
      });
    }

    function chiaveAnnuncio(azienda) {
      return [
        String(azienda.nome || "").trim().toLowerCase(),
        String(azienda.prezzo || "").trim(),
        String(azienda.file || "").trim(),
      ].join("|");
    }

    function renderAziende() {
      const aziende = [
        ...aziendeLocali,
        ...aziendeRemote.map((azienda, index) => ({
          ...azienda,
          id: azienda.id || `remota-${index}`,
          origine: "remota",
        })),
      ];

      listaAziende.innerHTML = "";

      if (!aziende.length) {
        listaAziende.textContent = "Nessuna azienda presente.";
        listaAziende.className = "muted";
        return;
      }

      listaAziende.className = "";

      aziende.forEach((item) => {
        const div = document.createElement("div");
        div.className = "azienda";

        const mediaNode = creaMediaGallery(item);
        if (mediaNode) {
          div.appendChild(mediaNode);
        }

        const infoDiv = document.createElement("div");
        infoDiv.className = "azienda-info";

        const nome = document.createElement("strong");
        nome.textContent = item.nome || "Azienda senza nome";

        const prezzo = document.createElement("div");
        prezzo.className = "muted";
        prezzo.textContent = item.prezzo != null ? formattaPrezzo(item.prezzo) : "";

        const origine = document.createElement("div");
        origine.className = "muted status-note";
        origine.textContent = item.origine === "locale"
          ? "Salvata in questo browser"
          : "Caricata online";

        infoDiv.appendChild(nome);
        infoDiv.appendChild(prezzo);
        infoDiv.appendChild(origine);

        div.appendChild(infoDiv);

        if (item.origine === "locale") {
          const actions = document.createElement("div");
          actions.className = "azienda-actions";

          const elimina = document.createElement("button");
          elimina.type = "button";
          elimina.className = "danger";
          elimina.textContent = "Elimina";
          elimina.addEventListener("click", () => eliminaAziendaLocale(item.id));

          actions.appendChild(elimina);
          div.appendChild(actions);
        }

        listaAziende.appendChild(div);
      });
    }

    function creaMediaGallery(item) {
      const allegati = ottieniAllegati(item);
      if (!allegati.length) {
        return null;
      }

      const gallery = document.createElement("div");
      gallery.className = "media-gallery";

      allegati.forEach((allegato) => {
        gallery.appendChild(creaMedia(allegato, item.nome));
      });

      return gallery;
    }

    function creaMedia(allegato, nomeAzienda) {
      if (allegato.mimeType && allegato.mimeType.startsWith("application/pdf")) {
        const link = document.createElement("a");
        link.href = allegato.file;
        link.target = "_blank";
        link.rel = "noopener";
        link.textContent = allegato.fileName || "Visualizza PDF";
        return link;
      }

      const img = document.createElement("img");
      img.alt = nomeAzienda ? `Foto ${nomeAzienda}` : "Foto azienda";

      if (estraiDriveId(allegato.file)) {
        caricaImmagineDrive(img, allegato.file);
      } else {
        img.src = allegato.file;
        img.addEventListener("error", () => mostraAllegatoNonDisponibile(img));
      }

      return img;
    }

    function ottieniAllegati(item) {
      if (Array.isArray(item.files) && item.files.length) {
        return item.files.filter((allegato) => allegato && allegato.file);
      }

      if (typeof item.files === "string" && item.files.trim()) {
        try {
          const files = JSON.parse(item.files);
          if (Array.isArray(files)) {
            return files.filter((allegato) => allegato && allegato.file);
          }
        } catch (err) {
          console.warn("Lista allegati non leggibile:", err);
        }
      }

      if (item.file) {
        return [{
          file: item.file,
          mimeType: item.mimeType || "",
          fileName: item.fileName || "",
        }];
      }

      return [];
    }

    async function caricaImmagineDrive(img, url) {
      const driveId = estraiDriveId(url);
      const thumbnailUrl = driveId
        ? `https://drive.google.com/thumbnail?id=${driveId}&sz=w600`
        : null;
      let tentativoThumbnail = false;

      img.addEventListener("error", () => {
        if (thumbnailUrl && !tentativoThumbnail) {
          tentativoThumbnail = true;
          img.src = thumbnailUrl;
          return;
        }
        mostraAllegatoNonDisponibile(img);
      });

      img.src = url;
    }

    function mostraAllegatoNonDisponibile(node) {
      const box = document.createElement("div");
      box.className = "media-fallback";
      box.textContent = "Foto non disponibile. Ricarica l'immagine.";
      node.replaceWith(box);
    }

    function estraiDriveId(url) {
      const patterns = [
        /drive\.google\.com\/file\/d\/([^/]+)/,
        /drive\.google\.com\/uc\?[^#]*id=([^&#]+)/,
        /drive\.google\.com\/open\?[^#]*id=([^&#]+)/,
        /drive\.google\.com\/thumbnail\?[^#]*id=([^&#]+)/,
      ];

      for (const pattern of patterns) {
        const match = String(url).match(pattern);
        if (match) {
          return decodeURIComponent(match[1]);
        }
      }

      return null;
    }

    function formattaPrezzo(prezzo) {
      return new Intl.NumberFormat("it-IT", {
        style: "currency",
        currency: "EUR",
      }).format(Number(prezzo));
    }

    function eliminaAziendaLocale(id) {
      aziendeLocali = aziendeLocali.filter((azienda) => azienda.id !== id);
      salvaArchivioLocale();
      renderAziende();
    }

    svuotaLocaleButton.addEventListener("click", () => {
      if (!aziendeLocali.length) {
        formMessaggi.textContent = "L'archivio locale e' gia' vuoto.";
        formMessaggi.className = "success";
        return;
      }

      if (!confirm("Vuoi eliminare tutte le aziende salvate in questo browser?")) {
        return;
      }

      aziendeLocali = [];
      salvaArchivioLocale();
      formMessaggi.textContent = "Archivio locale svuotato.";
      formMessaggi.className = "success";
      renderAziende();
    });

    // Caricamento iniziale
    document.addEventListener("DOMContentLoaded", () => {
      aggiornaAreaRiservata();
      caricaAziende();
    });
  </script>
</body>
</html>
